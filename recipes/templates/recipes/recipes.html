{% extends "base.html" %}

{% block title %}Recipes{% endblock %}

{% block content %} 
<h1 class="text-center p-2 d-block">
    Latest Recipes
</h1>
<div class="container">
    <div class="row g-3">
        {% for recipe in recipes %}
        <div class="col-12 col-sm-6 col-md-4 col-lg-3">
            <a href="" class="recipes text-decoration-none" aria-label="Click to view {{ recipe.title }}">
                <div class="card">
                    <img src="{{ recipe.image.url }}" class="card-img-top" alt="{{ recipe.image_alt }}">
                    <div class="card-body">
                        <h5 class="card-title">{{ recipe.title }}</h5>
                        <p class="card-text">{{ recipe.description|truncatechars:100 }}</p>
                    </div>
                </div>
            </a>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
